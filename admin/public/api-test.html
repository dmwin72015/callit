<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>API 网络测试</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    .success { color: green; }
    .error { color: red; }
    .info { color: blue; }
    pre { background: #f5f5f5; padding: 10px; }
  </style>
</head>
<body>
  <h1>API 网络诊断</h1>
  <button onclick="runTests()">运行测试</button>
  <div id="result"></div>

  <script>
    const result = document.getElementById('result');

    function log(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = type;
      div.innerHTML = msg;
      result.appendChild(div);
    }

    async function runTests() {
      result.innerHTML = '';

      // 1. 测试后端直接访问
      log('<h3>1. 直接访问后端</h3>');
      try {
        const r1 = await fetch('http://localhost:8081/health');
        log(`状态: ${r1.status} ${r1.statusText}`, r1.ok ? 'success' : 'error');
        log(`响应: ${await r1.text()}`);
      } catch (err) {
        log(`❌ 错误: ${err.message}`, 'error');
      }

      // 2. 测试登录（直接）
      log('<h3>2. 直接访问登录接口</h3>');
      try {
        const r2 = await fetch('http://localhost:8081/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: 'admin@test.com', password: 'Test123456' })
        });
        log(`状态: ${r2.status} ${r2.statusText}`, r2.ok ? 'success' : 'error');
        const data2 = await r2.json();
        log(`响应: <pre>${JSON.stringify(data2, null, 2)}</pre>`);
      } catch (err) {
        log(`❌ 错误: ${err.message}`, 'error');
      }

      // 3. 测试通过代理
      log('<h3>3. 通过 Vite 代理访问</h3>');
      try {
        const r3 = await fetch('/admin/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: 'admin@test.com', password: 'Test123456' })
        });
        log(`状态: ${r3.status} ${r3.statusText}`, r3.ok ? 'success' : 'error');
        const data3 = await r3.json();
        log(`响应: <pre>${JSON.stringify(data3, null, 2)}</pre>`);
      } catch (err) {
        log(`❌ 错误: ${err.message}`, 'error');
      }

      // 4. 测试健康检查（直接）
      log('<h3>4. 健康检查（直接）</h3>');
      try {
        const r4 = await fetch('http://localhost:8081/health');
        log(`状态: ${r4.status} ${r4.statusText}`, r4.ok ? 'success' : 'error');
        log(`响应: ${await r4.text()}`);
      } catch (err) {
        log(`❌ 错误: ${err.message}`, 'error');
      }

      // 4. 检查环境变量
      log('<h3>4. 检查环境变量</h3>');
      log(`VITE_API_BASE_URL: ${import.meta.env.VITE_API_BASE_URL || '未设置'}`);

      // 5. 总结
      log('<h3>总结</h3>');
      log('✅ 如果测试 3 成功，说明 Vite 代理配置正确！');
      log('❌ 如果测试 2 成功但测试 3 失败，说明 Vite 代理配置有问题。');
      log('❌ 如果测试 2 也失败，说明后端有问题。');
    }

    // 自动运行
    window.onload = () => runTests();
  </script>
</body>
</html>
