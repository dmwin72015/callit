<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Auth Debug Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #f5f5f5; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    button { margin: 10px 5px; padding: 10px 20px; cursor: pointer; }
    pre { background: #f0f0f0; padding: 10px; border-radius: 4px; overflow-x: auto; }
    .success { color: #52c41a; }
    .error { color: #ff4d4f; }
    .info { color: #1890ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>认证流程调试页面</h1>

    <div>
      <button onclick="testLogin()">1. 测试登录</button>
      <button onclick="checkStorage()">2. 检查存储</button>
      <button onclick="simulateProtectedRoute()">3. 模拟权限检查</button>
      <button onclick="clearAll()">清除所有数据</button>
    </div>

    <div id="output"></div>
  </div>

  <script>
    const output = document.getElementById('output');

    function log(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = type;
      div.innerHTML = msg;
      output.appendChild(div);
    }

    function clearAll() {
      localStorage.clear();
      output.innerHTML = '';
      log('✅ 已清除所有数据');
    }

    async function testLogin() {
      output.innerHTML = '';
      log('<h3>步骤 1: 测试登录</h3>');

      try {
        const resp = await fetch('http://localhost:8081/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: 'admin@test.com', password: 'Test123456' })
        });

        const data = await resp.json();
        log(`状态码: ${resp.status}`, resp.status === 200 ? 'success' : 'error');
        log(`响应: <pre>${JSON.stringify(data, null, 2)}</pre>`, 'info');

        if (data.code === 0 && data.data.user) {
          log('<h3>步骤 2: 存储到 localStorage</h3>');
          localStorage.setItem('cnalias_access_token', data.data.access_token);
          localStorage.setItem('cnalias_refresh_token', data.data.refresh_token);
          localStorage.setItem('cnalias_user', JSON.stringify(data.data.user));
          log('✅ 已存储 user 数据');
          log(`   role: <strong>${data.data.user.role}</strong>`);

          // Check if admin
          const isAdmin = data.data.user.role === 'ADMIN';
          log(`   isAdmin(): <strong style="color: ${isAdmin ? 'green' : 'red'}">${isAdmin}</strong>`);

          if (!isAdmin) {
            log('❌ 用户角色不是 ADMIN！', 'error');
          } else {
            log('✅ 用户角色是 ADMIN', 'success');
          }
        } else {
          log('❌ 登录失败或响应中没有 user 数据', 'error');
        }
      } catch (err) {
        log(`❌ 错误: ${err.message}`, 'error');
      }
    }

    function checkStorage() {
      output.innerHTML = '';
      log('<h3>检查 localStorage</h3>');

      const token = localStorage.getItem('cnalias_access_token');
      const refreshToken = localStorage.getItem('cnalias_refresh_token');
      const userStr = localStorage.getItem('cnalias_user');

      if (!token || !userStr) {
        log('❌ localStorage 中没有认证数据，请先登录', 'error');
        return;
      }

      const user = JSON.parse(userStr);
      log('✅ 找到认证数据:', 'success');
      log(`<pre>${JSON.stringify({
        token: token.substring(0, 30) + '...',
        refreshToken: refreshToken ? refreshToken.substring(0, 30) + '...' : 'missing',
        user: user
      }, null, 2)}</pre>`);

      log('<h3>权限检查</h3>');
      const isAdmin = user?.role === 'ADMIN';
      log(`user.role: <strong>${user?.role}</strong>`);
      log(`isAdmin(): <strong style="color: ${isAdmin ? 'green' : 'red'}">${isAdmin}</strong>`);

      if (isAdmin) {
        log('✅ 权限检查通过', 'success');
      } else {
        log('❌ 权限不足 - 用户不是 ADMIN', 'error');
      }
    }

    async function simulateProtectedRoute() {
      output.innerHTML = '';
      log('<h3>模拟 ProtectedRoute 检查</h3>');

      const token = localStorage.getItem('cnalias_access_token');
      const userStr = localStorage.getItem('cnalias_user');

      if (!token || !userStr) {
        log('❌ 未登录', 'error');
        return;
      }

      const user = JSON.parse(userStr);

      // Simulate ProtectedRoute logic
      log('1. 检查是否认证...');
      const isAuthenticated = !!token;
      log(`   isAuthenticated(): ${isAuthenticated}`, isAuthenticated ? 'success' : 'error');

      if (!isAuthenticated) {
        log('❌ 应跳转到登录页', 'error');
        return;
      }

      log('2. 检查管理员权限...');
      const isAdmin = user?.role === 'ADMIN';
      log(`   user.role: ${user?.role}`);
      log(`   isAdmin(): ${isAdmin}`, isAdmin ? 'success' : 'error');

      if (!isAdmin) {
        log('❌ 应显示 403 权限不足', 'error');
        return;
      }

      log('3. 测试 API 访问...');
      try {
        const resp = await fetch('http://localhost:8081/api/v1/admin/stats', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await resp.json();
        log(`   API 状态码: ${resp.status}`, resp.status === 200 ? 'success' : 'error');
        log(`   API 响应: <pre>${JSON.stringify(data, null, 2)}</pre>`);
      } catch (err) {
        log(`   ❌ API 请求失败: ${err.message}`, 'error');
      }

      log('\n✅ ProtectedRoute 检查通过，应显示页面内容', 'success');
    }

    // Auto-run check on load
    window.onload = () => {
      const token = localStorage.getItem('cnalias_access_token');
      if (token) {
        checkStorage();
      }
    };
  </script>
</body>
</html>
