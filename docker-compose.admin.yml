version: '3.8'

services:
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: cnalias-admin
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api/v1
    restart: unless-stopped
    networks:
      - cnalias-network

volumes:
  admin_data:

networks:
  cnalias-network:
    external: true
