version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cnalias-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cnalias
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cnalias-network

  redis:
    image: redis:7-alpine
    container_name: cnalias-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cnalias-network

  # 可选：pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cnalias-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cnalias.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - cnalias-network
    profiles:
      - tools

  # 可选：Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: cnalias-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - cnalias-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  cnalias-network:
    driver: bridge
